<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Card</title>
    <link rel="stylesheet" href="../css/qr-card.css">
</head>
<body>
<main class="card" aria-label="QR code card">
    <div class="qr-panel">
        <img class="qr-art" src="../img/image-qr-code.png" alt="QR code linking to Frontend Mentor">
    </div>

    <h1 class="card-title">Improve your front-end skills by building projects</h1>
    <p class="card-copy">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
</main>
</body>
</html>
